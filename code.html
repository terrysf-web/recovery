<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Recovery Code Generator</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#eef2f7;color:#0f172a}
.wrap{max-width:430px;margin:0 auto;padding:18px 14px 70px}
.card{background:#fff;border-radius:24px;padding:18px;margin:12px 0;box-shadow:0 8px 26px rgba(15,23,42,.08);border:1px solid rgba(15,23,42,.06)}
.logo{width:110px;height:auto;margin-bottom:8px;opacity:.9}
h1{font-size:24px;line-height:1.1;margin:4px 0 6px;font-weight:950}
.sub{font-size:14px;line-height:1.42;color:#64748b}
label{display:block;font-size:13px;font-weight:900;color:#334155;margin:14px 0 6px}
input,select{width:100%;border:1px solid rgba(15,23,42,.14);background:#f8fafc;border-radius:16px;padding:13px;font-size:16px}
button{width:100%;border:0;border-radius:16px;padding:14px 16px;font-size:16px;font-weight:950;margin-top:14px;cursor:pointer}
.primary{background:#123c99;color:white}
.secondary{background:#f1f5f9;color:#334155}
.status{font-size:14px;font-weight:850;line-height:1.4;margin-top:12px}
.codeBox{display:none;text-align:center;background:#eff6ff;border:1px solid rgba(37,99,235,.20);border-radius:22px;padding:18px;margin-top:16px}
.code{font-size:34px;letter-spacing:.12em;font-weight:950;color:#0f172a;margin:6px 0}
.meta{font-size:13px;color:#475569;line-height:1.45}
.copyOk{color:#15803d;font-weight:900;margin-top:8px;font-size:13px}
.small{font-size:12px;color:#64748b;line-height:1.4;margin-top:12px}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <img class="logo" src="./logo.png" alt="SPARK logo">
    <h1>Recovery Code Generator</h1>
    <div class="sub">Quick mobile page for generating patient access codes.</div>

    <label>Admin Password</label>
    <input id="password" type="password" placeholder="Admin password">

    <label>Surgery Type</label>
    <select id="surgeryType">
      <option value="periodontal">Periodontal Surgery</option>
      <option value="implant">Implant</option>
      <option value="graft">Gum Grafting</option>
      <option value="extraction">Extraction</option>
    </select>

    <label>Surgery Date</label>
    <input id="surgeryDate" type="date">

    <button class="primary" onclick="generateCode()">Generate Patient Code</button>
    <button class="secondary" onclick="openFullAdmin()">Open Full Admin</button>

    <div id="status" class="status"></div>

    <div id="codeBox" class="codeBox">
      <div class="meta">Patient Access Code</div>
      <div id="codeText" class="code"></div>
      <button class="secondary" onclick="copyCode()">Copy Code</button>
      <div id="copyStatus" class="copyOk"></div>
      <div id="codeMeta" class="meta"></div>
    </div>

    <div class="small">The code locks to the first device that uses it and expires after the recovery period.</div>
  </div>
</div>

<script>
const WORKER_URL="https://shrill-union-34e3.terryjseo.workers.dev";

function todayYMD(){
  return new Intl.DateTimeFormat('en-CA',{timeZone:'America/Los_Angeles',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());
}

document.getElementById('surgeryDate').value=todayYMD();

async function generateCode(){
  const password=document.getElementById('password').value.trim();
  const surgeryType=document.getElementById('surgeryType').value;
  const surgeryDate=document.getElementById('surgeryDate').value;
  const status=document.getElementById('status');

  if(!password){
    status.textContent='Enter admin password first.';
    status.style.color='#b91c1c';
    return;
  }

  try{
    status.textContent='Generating code...';
    status.style.color='#334155';

    const res=await fetch(WORKER_URL+'/access-code',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-admin-password':password},
      body:JSON.stringify({surgeryType,surgeryDate})
    });

    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'Failed to generate code');

    document.getElementById('codeText').textContent=data.code;
    document.getElementById('codeMeta').innerHTML='Surgery date: '+data.surgeryDate+'<br>Expires: '+data.expiresAt;
    document.getElementById('codeBox').style.display='block';
    document.getElementById('copyStatus').textContent='';
    status.textContent='Code generated.';
    status.style.color='#15803d';
  }catch(e){
    status.textContent='Generate failed: '+e.message;
    status.style.color='#b91c1c';
  }
}

async function copyCode(){
  const code=document.getElementById('codeText').textContent.trim();
  if(!code)return;
  await navigator.clipboard.writeText(code);
  document.getElementById('copyStatus').textContent='Copied.';
}

function openFullAdmin(){
  location.href='./admin.html';
}
</script>
</body>
</html>
