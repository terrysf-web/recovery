<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Recovery Guide</title>

<link rel="manifest" href="./manifest.json?v=55">
<link rel="apple-touch-icon" href="./pwa_icon_192.png?v=55">
<meta name="theme-color" content="#13379b">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#eef2f7;color:#0f172a}
.wrap{max-width:430px;margin:0 auto;min-height:100vh;padding:42px 18px 60px;display:flex;align-items:center}
.card{width:100%;background:white;border-radius:34px;padding:30px 22px 26px;box-shadow:0 20px 60px rgba(15,23,42,.12)}
.topBar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px}
.logo{width:132px;height:auto;object-fit:contain}
.staffIcon{width:52px;height:52px;border-radius:18px;border:0;background:#f1f5f9;color:#475569;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s ease;box-shadow:inset 0 0 0 1px rgba(15,23,42,.05)}
.staffIcon:active{transform:scale(.96)}
.staffIcon svg{width:24px;height:24px}
h1{margin:0 0 12px;font-size:31px;line-height:1.08;font-weight:950;color:#0b1533}
.desc{font-size:15px;line-height:1.58;color:#475569;margin-bottom:24px}
.codeInput{width:100%;border:2px solid #e2e8f0;border-radius:22px;padding:20px 18px;text-align:center;font-size:24px;font-weight:900;letter-spacing:.16em;color:#64748b;text-transform:uppercase;margin-bottom:18px}
.primaryBtn{width:100%;border:0;border-radius:22px;padding:18px;background:#13379b;color:white;font-size:18px;font-weight:900;cursor:pointer}
.note{margin-top:18px;font-size:14px;line-height:1.45;color:#64748b}
</style>
</head>

<body>
<div class="wrap">
  <div class="card">
    <div class="topBar">
      <img class="logo" src="./logo.png?v=55" alt="SPARK logo">
      <button class="staffIcon" onclick="openStaffMode()" title="Staff Login">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 19a6 6 0 0 0-12 0"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="m17 10 4 4"/>
          <path d="m15 21 2-6 4 4-6 2z"/>
        </svg>
      </button>
    </div>

    <h1>Recovery Guide</h1>
    <div class="desc">Enter your access code to open your personalized recovery guide.</div>
    <input class="codeInput" placeholder="ENTER CODE">
    <button class="primaryBtn">Open Recovery Guide</button>
    <div class="note">This code expires automatically when the recovery period is complete.</div>
  </div>
</div>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js?v=55');
  });
}

function openStaffMode(){
  location.href='./code.html';
}
</script>
</body>
</html>
