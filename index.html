<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Recovery Guide</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#eef2f7;
  color:#0f172a;
}
.wrap{
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  padding:40px 18px 60px;
  display:flex;
  align-items:center;
}
.card{
  width:100%;
  background:white;
  border-radius:34px;
  padding:28px 22px 24px;
  box-shadow:0 20px 60px rgba(15,23,42,.12);
  position:relative;
}
.topBar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:24px;
}
.logo{
  width:120px;
  height:auto;
  object-fit:contain;
}
.staffIcon{
  width:42px;
  height:42px;
  border-radius:14px;
  border:0;
  background:#eef2f7;
  color:#334155;
  font-size:20px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.staffIcon:active{
  transform:scale(.97);
}
h1{
  margin:0 0 12px;
  font-size:30px;
  line-height:1.1;
  font-weight:950;
  color:#0f172a;
}
.desc{
  font-size:15px;
  line-height:1.55;
  color:#475569;
  margin-bottom:24px;
}
.codeInput{
  width:100%;
  border:2px solid #e2e8f0;
  border-radius:22px;
  padding:20px 18px;
  text-align:center;
  font-size:24px;
  font-weight:900;
  letter-spacing:.16em;
  color:#475569;
  text-transform:uppercase;
  margin-bottom:18px;
}
.primaryBtn{
  width:100%;
  border:0;
  border-radius:22px;
  padding:18px;
  background:#13379b;
  color:white;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}
.note{
  margin-top:18px;
  font-size:14px;
  line-height:1.45;
  color:#64748b;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">

    <div class="topBar">
      <img class="logo" src="./logo.png" alt="SPARK logo">

      <button class="staffIcon" onclick="openStaffMode()" title="Staff Login">
        ⚙️
      </button>
    </div>

    <h1>Recovery Access Code</h1>

    <div class="desc">
      Enter the recovery code provided by the clinic to open your personalized recovery guide.
    </div>

    <input class="codeInput" placeholder="ENTER CODE">

    <button class="primaryBtn">
      Open Recovery Guide
    </button>

    <div class="note">
      This code expires automatically when the recovery period is complete.
    </div>

  </div>
</div>

<script>
function openStaffMode(){
  location.href='./code.html';
}
</script>
</body>
</html>
