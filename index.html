<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dental Recovery Guide</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#eef2f7;color:#0f172a} .phone{max-width:430px;min-height:100vh;margin:0 auto;background:#f8fafc;box-shadow:0 0 35px rgba(15,23,42,.18);position:relative;padding-bottom:92px} header{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,#0f172a,#172554,#1e40af);color:white;padding:22px 20px 20px;border-bottom-left-radius:28px;border-bottom-right-radius:28px;box-shadow:0 8px 25px rgba(15,23,42,.22)} h1{font-size:22px;margin:0;font-weight:900;letter-spacing:-.5px}.sub{font-size:13px;color:#dbeafe;margin-top:7px;line-height:1.4}.status{margin-top:16px;background:rgba(255,255,255,.12);border-radius:18px;padding:13px}.status-row{display:flex;justify-content:space-between;gap:12px;align-items:center}.small{font-size:11px;color:#bfdbfe}.big{font-size:28px;font-weight:950;line-height:1}.bar{height:8px;background:rgba(255,255,255,.22);border-radius:999px;overflow:hidden;margin-top:12px}.fill{height:100%;background:white;border-radius:999px;width:0%} main{padding:16px} h2{font-size:19px;margin:0 0 14px;font-weight:900}.card{background:white;border:1px solid #e2e8f0;border-radius:22px;padding:16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(15,23,42,.05)}button{font:inherit}.surgery{width:100%;display:flex;align-items:center;gap:13px;text-align:left;background:white;border:1px solid #e2e8f0;border-radius:20px;padding:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(15,23,42,.05)}.surgery:active,.primary:active,.tab:active,.reset:active{transform:scale(.99)}.icon{width:50px;height:50px;border-radius:17px;background:#eff6ff;display:flex;align-items:center;justify-content:center;font-size:25px;flex-shrink:0}.name{font-weight:900}.days{font-size:12px;color:#64748b;margin-top:3px}.arrow{margin-left:auto;color:#94a3b8;font-size:24px}.back{border:0;background:transparent;color:#1d4ed8;font-weight:800;padding:0;margin-bottom:12px}.date-input{width:100%;border:2px solid #e2e8f0;background:#f8fafc;border-radius:18px;padding:15px;font-size:18px;font-weight:800;outline:none}.primary{width:100%;margin-top:14px;border:0;border-radius:18px;background:#172554;color:white;padding:16px;font-weight:950;font-size:16px}.primary:disabled{background:#cbd5e1}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;background:#e2e8f0;padding:5px;border-radius:18px;margin-bottom:13px}.tab{border:0;border-radius:14px;padding:12px;background:transparent;color:#64748b;font-weight:900}.tab.active{background:white;color:#0f172a;box-shadow:0 2px 8px rgba(15,23,42,.08)}.warning{display:flex;gap:12px;background:#fffbeb;border-color:#fcd34d;color:#78350f;font-weight:700;line-height:1.45}.section-title{font-weight:950;margin-bottom:10px}.red{color:#b91c1c}.green{color:#15803d}.item{border-radius:16px;padding:12px 13px;margin-top:8px;font-size:14px;font-weight:700;line-height:1.35}.no{background:#fef2f2;color:#7f1d1d}.yes{background:#f0fdf4;color:#14532d}.emergency li{margin:8px 0;font-size:14px;color:#334155}.bottom{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid #e2e8f0;padding:12px}.reset{width:100%;border:0;border-radius:18px;background:#0f172a;color:white;padding:16px;font-weight:950}.now{font-size:11px;background:#dbeafe;color:#1e40af;padding:5px 10px;border-radius:999px;font-weight:950}.hidden{display:none}.timeline-head{display:flex;justify-content:space-between;align-items:center;gap:10px}.muted{color:#64748b;font-size:12px;line-height:1.4}.footer-note{font-size:11px;color:#64748b;text-align:center;margin-top:18px;line-height:1.4}
  </style>
</head>
<body>
  <div class="phone">
    <header>
      <h1>🦷 Dental Recovery Guide</h1>
      <div class="sub">Check what to avoid and what is okay today.</div>
      <div id="status" class="status hidden"></div>
    </header>
    <main id="app"></main>
    <div id="bottom" class="bottom hidden"><button class="reset" onclick="resetApp()">↻ Start Over</button></div>
  </div>
<script>
const SURGERIES=[
{id:'flap',icon:'🔬',name:'Periodontal Flap Surgery',days:21},
{id:'gingivectomy',icon:'✂️',name:'Gingivectomy',days:14},
{id:'bonegraft',icon:'🦴',name:'Bone Graft',days:28},
{id:'implant',icon:'🔩',name:'Dental Implant',days:21},
{id:'extraction',icon:'🦷',name:'Tooth Extraction',days:14},
{id:'scaling',icon:'🪥',name:'Scaling & Root Planing',days:10}
];
const RULES={
day0:{label:'Day of Surgery',warning:'Blood clot formation is important today. Rest and avoid disturbing the area.',no:['No brushing / rinsing / spitting','No straws','No hot food or drinks','No exercise / smoking / alcohol'],yes:['Bite gauze for 30 minutes','Ice pack 10 min ON / 5 min OFF','Cold soft foods','Take prescribed medications']},
day1:{label:'Days 1–2',warning:'Swelling and soreness may peak during this period.',no:['No direct brushing at surgical site','No straws or spitting','No strenuous exercise','No smoking or alcohol'],yes:['Saltwater rinse after 24 hours','Gentle brushing away from site','Soft foods','Continue prescribed medications']},
day3:{label:'Days 3–6',warning:'Call your dentist if pain suddenly gets worse.',no:['No aggressive brushing at site','Avoid hard or chewy foods','No strenuous exercise','No smoking or alcohol'],yes:['Very gentle brushing around site','Continue saltwater rinses','Warm soft foods','Light walking']},
day7:{label:'Days 7–14',warning:'Confirm your suture removal or follow-up visit.',no:['Still avoid hard foods','Avoid chewing on surgical site','Avoid smoking if possible'],yes:['Slowly resume normal brushing','Light exercise OK','Mostly normal soft diet','Confirm dental appointment']},
done:{label:'Recovery Complete Stage',warning:'Check with your dentist if discomfort continues.',no:['Do not ignore ongoing pain, bleeding, or swelling'],yes:['Return to normal routine','Normal oral hygiene','Keep regular check-ups']}
};
const EMERGENCY=['Sudden severe pain starting on Day 4+','Heavy bleeding lasting more than 2 days','Fever above 101°F / 38.5°C','Swelling that worsens after Day 3'];
let state={screen:'surgery',surgeryId:'',date:'',tab:'today'};
function $(id){return document.getElementById(id)}
function selected(){return SURGERIES.find(s=>s.id===state.surgeryId)}
function daysSince(){const t=new Date();t.setHours(0,0,0,0);const d=new Date(state.date);d.setHours(0,0,0,0);return Math.floor((t-d)/86400000)}
function stage(ds,total){if(ds>=total)return'done'; if(ds>=7)return'day7'; if(ds>=3)return'day3'; if(ds>=1)return'day1'; return'day0'}
function today(){return new Date().toISOString().split('T')[0]}
function setState(p){state={...state,...p};render()}
function resetApp(){state={screen:'surgery',surgeryId:'',date:'',tab:'today'};render()}
function renderStatus(){const st=$('status'); const s=selected(); if(state.screen!=='dashboard'||!s){st.classList.add('hidden');st.innerHTML='';return} const ds=daysSince(); const pct=Math.min(100,Math.max(0,(ds/s.days)*100)); st.classList.remove('hidden'); st.innerHTML=`<div class="status-row"><div><div class="small">${s.name}</div><div class="small" style="margin-top:3px">${state.date}</div></div><div style="text-align:right"><div class="big">${ds>=s.days?'✓':'D+'+ds}</div><div class="small">${ds>=s.days?'Recovery Complete':'Day '+ds+' after surgery'}</div></div></div><div class="bar"><div class="fill" style="width:${pct}%"></div></div>`}
function render(){renderStatus(); $('bottom').classList.toggle('hidden',state.screen!=='dashboard'); const app=$('app');
 if(state.screen==='surgery'){app.innerHTML=`<h2>Select Surgery Type</h2>${SURGERIES.map(s=>`<button class="surgery" onclick="setState({surgeryId:'${s.id}',screen:'date'})"><div class="icon">${s.icon}</div><div><div class="name">${s.name}</div><div class="days">${s.days} day recovery guide</div></div><div class="arrow">›</div></button>`).join('')}<div class="footer-note">For general post-op guidance only. Always follow your dentist’s instructions.</div>`;return}
 if(state.screen==='date'){const s=selected(); app.innerHTML=`<button class="back" onclick="setState({screen:'surgery'})">← Back</button><div class="card"><div style="display:flex;gap:13px;align-items:center;margin-bottom:18px"><div class="icon">${s.icon}</div><div><div class="name">${s.name}</div><div class="days">${s.days} days</div></div></div><label class="name" style="display:block;margin-bottom:8px">📅 Select Surgery Date</label><input class="date-input" type="date" max="${today()}" value="${state.date}" onchange="setState({date:this.value})"><button class="primary" ${state.date?'':'disabled'} onclick="setState({screen:'dashboard'})">Start Recovery Guide</button></div>`;return}
 const s=selected(), ds=daysSince(), key=stage(ds,s.days), r=RULES[key];
 app.innerHTML=`<div class="tabs"><button class="tab ${state.tab==='today'?'active':''}" onclick="setState({tab:'today'})">Today</button><button class="tab ${state.tab==='timeline'?'active':''}" onclick="setState({tab:'timeline'})">Full Timeline</button></div>`+(state.tab==='today'?todayView(r):timelineView(key));
}
function todayView(r){return `<div class="card warning">⚠️ <div>${r.warning}</div></div>${ruleCard('Restricted / Caution','red',r.no)}${ruleCard('Allowed / Recommended','green',r.yes)}<div class="card emergency"><div class="section-title red">🆘 Contact your dentist immediately if:</div><ul>${EMERGENCY.map(i=>`<li>${i}</li>`).join('')}</ul></div>`}
function ruleCard(title,tone,items){return `<div class="card"><div class="section-title ${tone}">${tone==='red'?'🚫':'✅'} ${title}</div>${items.map(i=>`<div class="item ${tone==='red'?'no':'yes'}">${i}</div>`).join('')}</div>`}
function timelineView(current){return ['day0','day1','day3','day7','done'].map(k=>{const r=RULES[k];return `<div class="card" style="${k===current?'border-color:#3b82f6;box-shadow:0 0 0 3px #dbeafe':''}"><div class="timeline-head"><div class="name">${r.label}</div>${k===current?'<span class="now">NOW</span>':''}</div><div class="muted" style="margin:8px 0">${r.warning}</div><div class="muted">🚫 ${r.no[0]}</div><div class="muted" style="margin-top:4px">✅ ${r.yes[0]}</div></div>`}).join('')}
render();
</script>
</body>
</html>
